<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Album Sample App</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.45; }
      h1 { margin-bottom: 8px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-top: 12px; }
      code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
      ul { margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Album Sample App</h1>
    <p>This sample has two shareable folders: <code>photos</code> and <code>videos</code>.</p>

    <div class="card">
      <h2>Photos</h2>
      <ul id="photos"><li>Loading...</li></ul>
    </div>

    <div class="card">
      <h2>Videos</h2>
      <ul id="videos"><li>Loading...</li></ul>
    </div>

    <script>
      async function loadList(api, elementId) {
        const list = document.getElementById(elementId);
        try {
          const response = await fetch(api);
          const data = await response.json();
          const items = data.items || [];
          list.innerHTML = items.length
            ? items.map((name) => `<li>${name}</li>`).join("")
            : "<li>Folder is ready. Add files to this folder.</li>";
        } catch {
          list.innerHTML = "<li>Could not connect to server.</li>";
        }
      }

      loadList('/api/photos', 'photos');
      loadList('/api/videos', 'videos');
    </script>
  </body>
</html>
